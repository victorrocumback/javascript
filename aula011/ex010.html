<!DOCTYPE html>
<html lang="br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de mutas</title>
</head>
<body>
    <h1>Sistema de mutas</h1>
    <input type="number" name="" id="velocidade">
    <input type="button" value="Conferir" id="conferir" onclick='executar()'>
    <div id="msg"></div>


    <script>
        function executar(){
        var txtvel = document.getElementById('velocidade')
        var button = document.getElementById('conferir')
        var msg = document.getElementById('msg')
        var velo = Number(txtvel.value)
        
        msg.innerText('Sua velocidade é' + velo)
        
        }
       

    </script>
</body>
</html>
